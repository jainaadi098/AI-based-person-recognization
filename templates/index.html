<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Surveillance Dashboard</title>
    <style>
        body { background: #050a15; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        h2 { border-bottom: 1px solid #1e293b; padding-bottom: 10px; color: #00ffcc; font-size: 18px; }
        .container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; height: 90vh; }
        .video-box { background: #000; border: 2px solid #1e293b; border-radius: 12px; overflow: hidden; }
        .video-box img { width: 100%; height: 100%; object-fit: contain; }
        .sidebar { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 15px; overflow-y: auto; }
        .log-card { 
            background: #1e293b; border-radius: 8px; padding: 10px; margin-bottom: 12px; 
            display: flex; align-items: center; gap: 15px; border-left: 4px solid #00ffcc;
        }
        .log-card img { width: 65px; height: 65px; border-radius: 6px; object-fit: cover; border: 1px solid #00ffcc; }
        .log-info b { font-size: 16px; color: #fff; display: block; }
        .log-info small { color: #00ffcc; font-weight: bold; }
        .time-stamp { font-size: 11px; opacity: 0.5; display: block; margin-top: 4px; }
    </style>
</head>
<body>
    <h2>Live Identification - System Active</h2>
    <div class="container">
        <div class="video-box">
            <img src="{{ url_for('video_feed') }}">
        </div>
        <div class="sidebar" id="log-list">
            </div>
    </div>

    <script>
        function refresh() {
            fetch('/get_logs').then(r => r.json()).then(data => {
                const list = document.getElementById('log-list');
                list.innerHTML = '';
                data.forEach(d => {
                    list.innerHTML += `
                    <div class="log-card">
                        <img src="data:image/jpeg;base64,${d.img}">
                        <div class="log-info">
                            <b>${d.name}</b>
                            <small>Match: ${d.conf}</small>
                            <span class="time-stamp">${d.time}</span>
                        </div>
                    </div>`;
                });
            });
        }
        setInterval(refresh, 2000);
    </script>
</body>
</html>
